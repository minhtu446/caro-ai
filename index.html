<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caro AI - 20x20</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #1a1a2e;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}
canvas {
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
#status {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  padding: 8px 24px;
  border-radius: 8px;
  z-index: 10;
  text-align: center;
  min-width: 200px;
}
#restartBtn {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 10px 32px;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  z-index: 10;
  transition: background 0.2s;
}
#restartBtn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div id="status">Đang suy nghĩ...</div>
<canvas id="game"></canvas>
<button id="restartBtn">Chơi lại</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

const SIZE = 30;
const CELL = 22;
const PADDING = 24;
const BOARD = CELL * SIZE;
const W = BOARD + PADDING * 2;
const H = BOARD + PADDING * 2;
canvas.width = W;
canvas.height = H;

let board = [];
let currentPlayer = 1; // 1 = player (X), -1 = AI (O)
let gameOver = false;
let winner = null;
let thinking = false;
let audioCtx = null;

const EMPTY = 0, PLAYER = 1, AI = -1;

// Audio
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = 'sine', vol = 0.15) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol = 0.04) {
  if (!audioCtx) return;
  const bs = audioCtx.sampleRate * dur;
  const b = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
  const s = audioCtx.createBufferSource();
  s.buffer = b;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  s.connect(g); g.connect(audioCtx.destination);
  s.start();
}
function playPlace() {
  playTone(800, 0.08, 'sine', 0.12);
  playNoise(0.03, 0.03);
}
function playWin() {
  setTimeout(() => playTone(523, 0.15, 'sine', 0.15), 0);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.15), 150);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 300);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.18), 450);
}
function playLose() {
  playTone(400, 0.2, 'sawtooth', 0.1);
  setTimeout(() => playTone(300, 0.2, 'sawtooth', 0.1), 200);
  setTimeout(() => playTone(200, 0.4, 'sawtooth', 0.12), 400);
}

function initBoard() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  currentPlayer = PLAYER;
  gameOver = false;
  winner = null;
  thinking = false;
  statusEl.textContent = 'Lượt của bạn (X)';
}

initBoard();

function checkWin(r, c, player) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = -1; d <= 1; d += 2) {
      let nr = r + dr * d, nc = c + dc * d;
      while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) {
        count++;
        nr += dr * d;
        nc += dc * d;
      }
    }
    if (count >= 5) return true;
  }
  return false;
}

function isFull() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (board[r][c] === EMPTY) return false;
  return true;
}

function placeMove(r, c, player) {
  board[r][c] = player;
  playPlace();
  if (checkWin(r, c, player)) {
    gameOver = true;
    winner = player;
    if (player === PLAYER) { statusEl.textContent = 'Bạn thắng! 🎉'; playWin(); }
    else { statusEl.textContent = 'AI thắng! 🤖'; playLose(); }
    return true;
  }
  if (isFull()) {
    gameOver = true;
    statusEl.textContent = 'Hòa!';
    playTone(440, 0.3, 'sine', 0.1);
    return true;
  }
  return false;
}

// ===== AI SUPER STRONG =====
const DIRECTIONS = [[1,0],[0,1],[1,1],[1,-1]];

// Pattern recognition
function analyzeDir(r, c, dr, dc) {
  let empty = 0, myCount = 0, oppCount = 0;
  let myOpen = 0, oppOpen = 0;
  let myBlocked = 0, oppBlocked = 0;

  for (let d = 1; d <= 4; d++) {
    const nr = r + dr * d, nc = c + dc * d;
    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { myBlocked++; break; }
    if (board[nr][nc] === AI) myCount++;
    else if (board[nr][nc] === EMPTY) { myOpen++; break; }
    else { myBlocked++; break; }
  }
  for (let d = 1; d <= 4; d++) {
    const nr = r - dr * d, nc = c - dc * d;
    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { myBlocked++; break; }
    if (board[nr][nc] === AI) myCount++;
    else if (board[nr][nc] === EMPTY) { myOpen++; break; }
    else { myBlocked++; break; }
  }

  for (let d = 1; d <= 4; d++) {
    const nr = r + dr * d, nc = c + dc * d;
    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { oppBlocked++; break; }
    if (board[nr][nc] === PLAYER) oppCount++;
    else if (board[nr][nc] === EMPTY) { oppOpen++; break; }
    else { oppBlocked++; break; }
  }
  for (let d = 1; d <= 4; d++) {
    const nr = r - dr * d, nc = c - dc * d;
    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { oppBlocked++; break; }
    if (board[nr][nc] === PLAYER) oppCount++;
    else if (board[nr][nc] === EMPTY) { oppOpen++; break; }
    else { oppBlocked++; break; }
  }

  return { myCount, myOpen, myBlocked, oppCount, oppOpen, oppBlocked };
}

// Score patterns properly
function patternScore(count, open) {
  if (count >= 5) return 100000000;
  if (count === 4) {
    if (open >= 2) return 10000000;   // open 4 - guaranteed win
    if (open === 1) return 500000;    // half-open 4
    return 5000;
  }
  if (count === 3) {
    if (open >= 2) return 50000;      // open 3 - very dangerous
    if (open === 1) return 5000;
    return 500;
  }
  if (count === 2) {
    if (open >= 2) return 500;
    if (open === 1) return 50;
    return 5;
  }
  if (count === 1) {
    if (open >= 2) return 10;
    if (open === 1) return 3;
    return 1;
  }
  return 0;
}

// Fast heuristic for move ordering
function quickScore(r, c) {
  let myScore = 0, oppScore = 0;
  for (const [dr, dc] of DIRECTIONS) {
    const a = analyzeDir(r, c, dr, dc);
    myScore += patternScore(a.myCount, a.myOpen);
    oppScore += patternScore(a.oppCount, a.oppOpen);
  }
  return myScore * 1.1 + oppScore; // slight bias for attack
}

// Get sorted candidates
function getCandidates() {
  const map = new Map();
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== EMPTY) continue;
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== EMPTY) {
            const key = r * SIZE + c;
            if (!map.has(key)) map.set(key, quickScore(r, c));
          }
        }
      }
    }
  }
  return [...map.entries()].sort((a, b) => b[1] - a[1]).map(([k]) => ({ r: Math.floor(k / SIZE), c: k % SIZE }));
}

// Full board evaluation
function evaluateBoard() {
  let score = 0;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] === EMPTY) continue;
      for (const [dr, dc] of DIRECTIONS) {
        const a = analyzeDir(r, c, dr, dc);
        if (board[r][c] === AI) {
          score += patternScore(a.myCount, a.myOpen);
          score -= patternScore(a.oppCount, a.oppOpen) * 0.5;
        } else {
          score -= patternScore(a.myCount, a.myOpen);
          score += patternScore(a.oppCount, a.oppOpen) * 0.5;
        }
      }
    }
  }
  return score;
}

// Check if a move creates a winning threat (open 4 or 5)
function hasThreat(r, c, player) {
  board[r][c] = player;
  const win = checkWin(r, c, player);
  board[r][c] = EMPTY;
  if (win) return 5;

  let threats = 0;
  for (const [dr, dc] of DIRECTIONS) {
    const a = analyzeDir(r, c, dr, dc);
    if (player === AI) {
      if (a.myCount >= 4 && a.myOpen >= 1) threats++;
    } else {
      if (a.oppCount >= 4 && a.oppOpen >= 1) threats++;
    }
  }
  return threats;
}

// Check double threat (forced win)
function hasDoubleThreat(player) {
  const opp = player === AI ? PLAYER : AI;
  for (const { r, c } of getCandidates()) {
    const t = hasThreat(r, c, player);
    if (t >= 5) return { r, c, level: 5 };
    if (t >= 2) return { r, c, level: 2 };
  }
  // Check if opponent has a winning threat we must block
  for (const { r, c } of getCandidates()) {
    const t = hasThreat(r, c, opp);
    if (t >= 5) return { r, c, level: 5, block: true };
    if (t >= 2) return { r, c, level: 2, block: true };
  }
  return null;
}

// Minimax with iterative deepening
let tt = new Map();

function minimax(depth, alpha, beta, isMax) {
  const player = isMax ? AI : PLAYER;

  // Check for forced threats
  const dt = hasDoubleThreat(player);
  if (dt && dt.level >= 5) {
    return isMax ? 99999999 - depth * 10 : -99999999 + depth * 10;
  }
  if (dt && dt.level >= 2 && depth >= 2) {
    // Force search this critical move
    board[dt.r][dt.c] = player;
    const s = minimax(depth - 1, alpha, beta, !isMax);
    board[dt.r][dt.c] = EMPTY;
    return isMax ? Math.max(alpha, s) : Math.min(beta, s);
  }

  if (depth === 0) {
    const ev = evaluateBoard();
    return isMax ? ev : -ev;
  }

  const candidates = getCandidates();
  if (candidates.length === 0) return 0;

  const maxCandidates = depth >= 3 ? 10 : 15;
  const top = candidates.slice(0, Math.min(maxCandidates, candidates.length));

  if (isMax) {
    let maxEval = -Infinity;
    for (const { r, c } of top) {
      board[r][c] = AI;
      const ev = minimax(depth - 1, alpha, beta, false);
      board[r][c] = EMPTY;
      if (ev > maxEval) maxEval = ev;
      if (ev > alpha) alpha = ev;
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const { r, c } of top) {
      board[r][c] = PLAYER;
      const ev = minimax(depth - 1, alpha, beta, true);
      board[r][c] = EMPTY;
      if (ev < minEval) minEval = ev;
      if (ev < beta) beta = ev;
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

function aiMove() {
  if (gameOver || thinking) return;
  thinking = true;
  statusEl.textContent = 'AI đang suy nghĩ...';

  setTimeout(() => {
    // 1. Check immediate win
    for (const { r, c } of getCandidates()) {
      board[r][c] = AI;
      if (checkWin(r, c, AI)) { board[r][c] = EMPTY; placeMove(r, c, AI); currentPlayer = PLAYER; statusEl.textContent = 'Lượt của bạn (X)'; thinking = false; draw(); return; }
      board[r][c] = EMPTY;
    }
    // 2. Block opponent's immediate win
    for (const { r, c } of getCandidates()) {
      board[r][c] = PLAYER;
      if (checkWin(r, c, PLAYER)) { board[r][c] = EMPTY; placeMove(r, c, AI); currentPlayer = PLAYER; statusEl.textContent = 'Lượt của bạn (X)'; thinking = false; draw(); return; }
      board[r][c] = EMPTY;
    }

    // 3. Check double-threat wins / block double threats
    for (const { r, c } of getCandidates()) {
      board[r][c] = AI;
      const t = hasThreat(r, c, AI);
      board[r][c] = EMPTY;
      if (t >= 2) {
        placeMove(r, c, AI);
        currentPlayer = PLAYER;
        statusEl.textContent = 'Lượt của bạn (X)';
        thinking = false; draw(); return;
      }
    }
    for (const { r, c } of getCandidates()) {
      board[r][c] = PLAYER;
      const t = hasThreat(r, c, PLAYER);
      board[r][c] = EMPTY;
      if (t >= 2 && t < 5) {
        placeMove(r, c, AI);
        currentPlayer = PLAYER;
        statusEl.textContent = 'Lượt của bạn (X)';
        thinking = false; draw(); return;
      }
    }

    // 4. Opening
    let emptyCount = 0;
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (board[r][c] === EMPTY) emptyCount++;
    if (emptyCount === SIZE * SIZE) {
      placeMove(Math.floor(SIZE/2), Math.floor(SIZE/2), AI);
      currentPlayer = PLAYER; statusEl.textContent = 'Lượt của bạn (X)'; thinking = false; draw(); return;
    }
    if (emptyCount === SIZE * SIZE - 1) {
      const mid = Math.floor(SIZE/2);
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = mid + dr, nc = mid + dc;
          if (board[nr][nc] === EMPTY) { placeMove(nr, nc, AI); currentPlayer = PLAYER; statusEl.textContent = 'Lượt của bạn (X)'; thinking = false; draw(); return; }
        }
    }

    // 5. Iterative deepening search
    const candidates = getCandidates();
    const top = candidates.slice(0, Math.min(15, candidates.length));

    let bestMove = top[0];
    let bestScore = -Infinity;
    const maxDepth = emptyCount > 800 ? 3 : (emptyCount > 600 ? 4 : (emptyCount > 300 ? 5 : 6));

    for (const { r, c } of top) {
      board[r][c] = AI;
      const score = minimax(maxDepth - 1, -Infinity, Infinity, false);
      board[r][c] = EMPTY;
      if (score > bestScore) {
        bestScore = score;
        bestMove = { r, c };
      }
    }

    if (bestMove) {
      placeMove(bestMove.r, bestMove.c, AI);
      currentPlayer = PLAYER;
      statusEl.textContent = 'Lượt của bạn (X)';
    }
    thinking = false;
    draw();
  }, 50);
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, W, H);

  // bg
  ctx.fillStyle = '#F5E6CA';
  ctx.fillRect(0, 0, W, H);

  // border
  ctx.strokeStyle = '#C4A97D';
  ctx.lineWidth = 3;
  ctx.strokeRect(PADDING - 4, PADDING - 4, BOARD + 8, BOARD + 8);

  // grid - (SIZE+1) lines for SIZE cells
  ctx.strokeStyle = '#A0825A';
  ctx.lineWidth = 1;
  for (let i = 0; i <= SIZE; i++) {
    const pos = PADDING + i * CELL;
    ctx.beginPath();
    ctx.moveTo(PADDING, pos);
    ctx.lineTo(PADDING + BOARD, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, PADDING);
    ctx.lineTo(pos, PADDING + BOARD);
    ctx.stroke();
  }

  // star points at cell centers
  const stars = [[4,4],[4,14],[4,24],[14,4],[14,14],[14,24],[24,4],[24,14],[24,24]];
  ctx.fillStyle = '#A0825A';
  for (const [r, c] of stars) {
    const x = PADDING + (c + 0.5) * CELL, y = PADDING + (r + 0.5) * CELL;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // pieces - centered in each cell
  const half = CELL / 2 - 4;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] === EMPTY) continue;
      const x = PADDING + (c + 0.5) * CELL, y = PADDING + (r + 0.5) * CELL;
      if (board[r][c] === PLAYER) {
        // X - draw two crossing lines
        ctx.strokeStyle = '#e53935';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 3;
        ctx.beginPath();
        ctx.moveTo(x - half, y - half);
        ctx.lineTo(x + half, y + half);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + half, y - half);
        ctx.lineTo(x - half, y + half);
        ctx.stroke();
        ctx.shadowBlur = 0;
      } else {
        // O - draw circle outline
        ctx.strokeStyle = '#2E7D32';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 3;
        ctx.beginPath();
        ctx.arc(x, y, half - 1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }

  // last move indicator
  let lastR = -1, lastC = -1;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (board[r][c] !== EMPTY) { lastR = r; lastC = c; }
  if (lastR >= 0) {
    const x = PADDING + (lastC + 0.5) * CELL, y = PADDING + (lastR + 0.5) * CELL;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ===== INPUT =====
canvas.addEventListener('click', e => {
  initAudio();
  if (gameOver || thinking || currentPlayer !== PLAYER) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const c = Math.floor((mx - PADDING) / CELL);
  const r = Math.floor((my - PADDING) / CELL);
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
  if (board[r][c] !== EMPTY) return;

  const end = placeMove(r, c, PLAYER);
  draw();
  if (!end) {
    currentPlayer = AI;
    aiMove();
  }
});

document.getElementById('restartBtn').addEventListener('click', () => {
  initBoard();
  draw();
});

// initial draw
draw();
</script>
</body>
</html>
